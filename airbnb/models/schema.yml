models:
#the first testing model on dim_listings_cleansed
  - name: dim_listings_cleansed
    columns:

     - name: listing_id
       data_tests:
         - unique
         - not_null

     - name: host_id
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']

#the second testing model on dim_hosts_cleansed
  - name: dim_hosts_cleansed
    columns:

      - name: host_id
        data_tests:
         - unique
         - not_null

      - name: host_name
        data_tests:         
         - not_null

      - name: is_superhost
        data_tests:         
         - accepted_values:
             arguments:
               values: ['t', 'f','true','false']

#the second testing model on fct_reviews
  - name: fct_reviews
    columns:

      - name: listing_id
        data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_listings_cleansed')
               field: listing_id

      - name: reviewer_name
        data_tests:         
         - not_null

      - name: review_sentiment
        data_tests:         
         - accepted_values:
             arguments:
               values: ['positive', 'negative','neutral']